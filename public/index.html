<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Synthetic Biology Briefing</title>
  <style>
    :root{--bg:#faf8f5;--card:#fff;--line:#e8e1d8;--text:#1d1c19;--muted:#6f675c;--accent:#1d4ed8}
    body{margin:0;background:var(--bg);font-family:ui-sans-serif,system-ui;color:var(--text)}
    .wrap{max-width:1100px;margin:0 auto;padding:28px 18px 56px}
    .layout{display:grid;grid-template-columns:280px 1fr;gap:14px}
    .panel,.card{background:var(--card);border:1px solid var(--line);border-radius:14px}
    .panel{padding:12px}.card{padding:14px;margin-bottom:12px}
    .btn{display:block;width:100%;text-align:left;padding:10px;border:1px solid var(--line);background:#fff;border-radius:10px;cursor:pointer;margin-bottom:8px}
    .btn.active{border-color:var(--accent);box-shadow: inset 0 0 0 1px var(--accent)}
    .meta{color:var(--muted);font-size:.9rem}.hidden{display:none}
    .signal{border:1px solid var(--line);border-radius:10px;padding:10px;margin:0 0 8px}
    a{color:var(--accent);text-decoration:none} a:hover{text-decoration:underline}
    @media(max-width:900px){.layout{grid-template-columns:1fr}}
  </style>
</head>
<body>
<main class="wrap">
  <h1>What is happening in the diverse intelligence and emergence engineering space of synthetic biology?</h1>
  <p class="meta"><a href="https://briefing-hub.founders-0e1.workers.dev" target="_blank">← All briefings (hub)</a></p>
  <div class="layout">
    <aside class="panel">
      <h3>Dated briefing runs</h3>
      <div id="runNav"></div>
      <h3 style="margin-top:16px">Global views</h3>
      <button class="btn" data-id="signals" onclick="showSignals()">Signals index<div class='meta'>people + links</div></button>
    </aside>
    <section class="panel">
      <div id="runView"></div>
      <div id="signalsView" class="hidden"></div>
    </section>
  </div>
</main>
<script>
let runs=[];
let activeRun='';
const oneSentencePrompt = "what is happening in the diverse intelligence and emergence engineering space of synthetic biology?";

function runCard(run, data){
  const tweets = (data.tweets||[]).map(t => `<li>${t.text} → <a target='_blank' href='${t.url}'>${t.label||t.author||'tweet'}</a></li>`).join('');
  const papers = (data.papers||[]).map(p => `<li>${p.insight||p.whyItMatters||''} → <a target='_blank' href='${p.url||p.alphaXivUrl||p.arxivUrl}'>${p.title}</a></li>`).join('');
  return `
    <div class='card'><h3>Original prompt (one sentence)</h3><p>"${data.originalPrompt || oneSentencePrompt}"</p></div>
    <div class='card'><h3>Briefing (${run.date})</h3><p>${data.oneSentenceTake||''}</p><p class='meta'>Window: ${data.window||'n/a'}</p></div>
    <div class='card'><h3>Tweets</h3><ul>${tweets}</ul></div>
    <div class='card'><h3>Papers</h3><ul>${papers}</ul></div>
  `;
}

async function showRun(date){
  document.getElementById('signalsView').classList.add('hidden');
  const run = runs.find(r=>r.date===date);
  if(!run) return;
  activeRun=date;
  document.querySelectorAll('#runNav .btn').forEach(b=>b.classList.remove('active'));
  document.querySelector(`#runNav .btn[data-date='${date}']`)?.classList.add('active');
  const data = await fetch(run.file).then(r=>r.json());
  document.getElementById('runView').innerHTML = runCard(run, data);
  document.getElementById('runView').classList.remove('hidden');
}

async function showSignals(){
  document.getElementById('runView').classList.add('hidden');
  const sigs = await fetch('/data/signals.json').then(r=>r.json());
  document.querySelectorAll('#runNav .btn').forEach(b=>b.classList.remove('active'));
  const html = sigs.map(s => {
    const links = Object.entries(s.links||{}).map(([k,v]) => {
      if(Array.isArray(v)) return `<li><strong>${k}</strong>: ${v.map(u=>`<a target='_blank' href='${u}'>link</a>`).join(' · ')}</li>`;
      return `<li><strong>${k}</strong>: <a target='_blank' href='${v}'>${v}</a></li>`;
    }).join('');
    return `<div class='signal'><div><strong>${s.name}</strong> <span class='meta'>${s.role||''}</span></div><ul>${links}</ul></div>`;
  }).join('');
  document.getElementById('signalsView').innerHTML = `<div class='card'><h3>Global Signals index</h3>${html}</div>`;
  document.getElementById('signalsView').classList.remove('hidden');
}

fetch('/data/runs.json').then(r=>r.json()).then(async (r)=>{
  runs=[...r].sort((a,b)=>b.date.localeCompare(a.date));
  runNav.innerHTML = runs.map(x=>`<button class='btn' data-date='${x.date}' onclick="showRun('${x.date}')">${x.date}<div class='meta'>${x.title}</div></button>`).join('');
  if(runs[0]) showRun(runs[0].date);
});
</script>
</body>
</html>
