<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Synthetic Biology Briefing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--background:#f8fafc;--foreground:#0f172a;--card:#fff;--card-foreground:#0f172a;--muted:#f1f5f9;--muted-foreground:#64748b;--border:#e2e8f0;--primary:#0f172a;--primary-foreground:#fff;--radius:12px}
    body{font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;margin:0;background:var(--background);color:var(--foreground)}
    .wrap{max-width:1200px;margin:0 auto;padding:20px}
    h1{font-size:1.75rem;line-height:1.2;letter-spacing:-.02em;margin:0 0 8px}
    .layout{display:grid;grid-template-columns:300px 1fr;gap:14px}
    .panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;box-shadow:0 1px 2px rgba(15,23,42,.04)}
    .btn{display:block;width:100%;margin:0 0 8px;padding:10px 12px;border:1px solid var(--border);border-radius:10px;background:var(--card);text-align:left;cursor:pointer;font-weight:500}
    .btn:hover{background:var(--muted)}
    .btn.active{border-color:#334155;background:#f8fafc}
    .meta{color:var(--muted-foreground);font-size:12px}
    .email{white-space:pre-wrap;line-height:1.65}
    a{color:#1d4ed8;text-decoration:none}
    a:hover{text-decoration:underline}
    .signal{border:1px solid var(--border);border-radius:10px;padding:10px;margin:0 0 8px;background:#fff}
    .run-row{border:1px solid var(--border);border-radius:10px;padding:8px;margin:0 0 8px;background:#fff}
    .run-actions{display:flex;gap:6px;margin-top:6px}
    .mini{padding:7px 8px;font-size:12px;margin:0}
    .raw-file{border:1px solid var(--border);border-radius:10px;padding:10px;margin:0 auto 10px;background:#fff;max-width:920px}
    .raw-file pre{white-space:pre-wrap;word-break:break-word;max-height:420px;overflow:auto;background:#f8fafc;border:1px solid var(--border);border-radius:8px;padding:10px}
    .section{border:1px solid var(--border);border-radius:10px;padding:8px;margin:0 0 10px;background:#fff}
    .section summary{cursor:pointer;font-weight:600}
    .desc{font-size:12px;color:var(--muted-foreground);margin:6px 0 10px}
    @media(max-width:900px){.layout{grid-template-columns:1fr}}
    @media(max-width:640px){.wrap{padding:12px}.panel{padding:10px}.raw-file{max-width:100%;padding:8px}.raw-file pre{font-size:12px;padding:8px}}
  </style>
</head>
<body>
<main class="wrap">
  <h1>What is happening in the diverse intelligence and emergence engineering space of synthetic biology?</h1>
  <p class="meta"><a href="https://briefing-hub.founders-0e1.workers.dev" target="_blank">← All briefings (hub)</a></p>
  <div class="layout">
    <aside class="panel">
      <h3>Dated briefing runs</h3>
      <div id="runNav"></div>
      <h3 style="margin-top:16px">Global views</h3>
      <button class="btn" data-id="signals" onclick="showSignals()">Signals index<div class='meta'>people + links</div></button>
    </aside>
    <section class="panel">
      <div id="runView"></div>
      <div id="signalsView" class="hidden"></div>
    </section>
  </div>
</main>
<script>
let runs=[];
let activeRun='';
const oneSentencePrompt = "what is happening in the diverse intelligence and emergence engineering space of synthetic biology?";

function runCard(run, data){
  const tweets = (data.tweets||[]).map(t => `<li>${t.text} → <a target='_blank' href='${t.url}'>${t.label||t.author||'tweet'}</a></li>`).join('');
  const papers = (data.papers||[]).map(p => `<li>${p.insight||p.whyItMatters||''} → <a target='_blank' href='${p.url||p.alphaXivUrl||p.arxivUrl}'>${p.title}</a></li>`).join('');
  return `
    <div class='card'><h3>Original prompt (one sentence)</h3><p>"${data.originalPrompt || oneSentencePrompt}"</p></div>
    <div class='card'><h3>Briefing (${run.date})</h3><p>${data.oneSentenceTake||''}</p><p class='meta'>Window: ${data.window||'n/a'}</p></div>
    <div class='card'><h3>Tweets</h3><ul>${tweets}</ul></div>
    <div class='card'><h3>Papers</h3><ul>${papers}</ul></div>
  `;
}

async function showRun(date){
  document.getElementById('signalsView').classList.add('hidden');
  const run = runs.find(r=>r.date===date);
  if(!run) return;
  activeRun=date;
  document.querySelectorAll('#runNav .btn').forEach(b=>b.classList.remove('active'));
  document.querySelector(`#runNav .btn[data-date='${date}']`)?.classList.add('active');
  const data = await fetch(run.file).then(r=>r.json());
  document.getElementById('runView').innerHTML = runCard(run, data);
  document.getElementById('runView').classList.remove('hidden');
}

async function showSignals(){
  document.getElementById('runView').classList.add('hidden');
  const sigs = await fetch('/data/signals.json').then(r=>r.json());
  document.querySelectorAll('#runNav .btn').forEach(b=>b.classList.remove('active'));
  const html = sigs.map(s => {
    const links = Object.entries(s.links||{}).map(([k,v]) => {
      if(Array.isArray(v)) return `<li><strong>${k}</strong>: ${v.map(u=>`<a target='_blank' href='${u}'>link</a>`).join(' · ')}</li>`;
      return `<li><strong>${k}</strong>: <a target='_blank' href='${v}'>${v}</a></li>`;
    }).join('');
    return `<div class='signal'><div><strong>${s.name}</strong> <span class='meta'>${s.role||''}</span></div><ul>${links}</ul></div>`;
  }).join('');
  document.getElementById('signalsView').innerHTML = `<div class='card'><h3>Global Signals index</h3>${html}</div>`;
  document.getElementById('signalsView').classList.remove('hidden');
}

fetch('/data/runs.json').then(r=>r.json()).then(async (r)=>{
  runs=[...r].sort((a,b)=>b.date.localeCompare(a.date));
  runNav.innerHTML = runs.map(x=>`<button class='btn' data-date='${x.date}' onclick="showRun('${x.date}')">${x.date}<div class='meta'>${x.title}</div></button>`).join('');
  if(runs[0]) showRun(runs[0].date);
});
</script>
</body>
</html>
